name: Contract Check

on:
  push:
    branches: [main, '001-api-sync-infra']
  pull_request:
    branches: [main, '001-api-sync-infra']

jobs:
  contract-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run unit and integration tests
        run: pnpm test

      - name: Strict contract gate (e2e fixture)
        working-directory: examples/single-service
        env:
          API_SYNC_STRICT: '1'
        run: pnpm exec sync-api run --strict
